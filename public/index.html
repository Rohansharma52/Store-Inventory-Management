<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Store Inventory Management</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Store Inventory Management</h1>

<!-- Add Product Card -->

<div class="card">

<h2>Add Product</h2>

<div class="form">

<input id="productName" placeholder="Product Name">

<input id="productCode" placeholder="Product Code">

<input id="category" placeholder="Category">

<input id="supplierName" placeholder="Supplier Name">

<input id="quantityInStock" placeholder="Quantity">

<input id="unitPrice" placeholder="Price">

<button onclick="addProduct()">Add Product</button>

</div>

</div>

<!-- Product Table -->

<div class="card">

<h2>Products</h2>

<button onclick="getProducts()">Load Products</button>

<table>

<thead>

<tr>
<th>Name</th>
<th>Category</th>
<th>Quantity</th>
<th>Price</th>
<th>Action</th>
</tr>

</thead>

<tbody id="productTable"></tbody>

</table>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
